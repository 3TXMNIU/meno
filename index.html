<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كرم الرمادي | القائمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            padding-bottom: 100px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #e63946;
            border-radius: 10px;
        }

        .header {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            background: linear-gradient(135deg, #e63946, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            font-weight: 900;
        }

        .logo p {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .banner {
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.1), rgba(0,0,0,0.5));
            margin: 20px;
            padding: 35px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(230, 57, 70, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease;
        }

        .banner h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e63946);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .banner p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .rating-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(230, 57, 70, 0.5);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .rating-btn:hover {
            background: #e63946;
            transform: translateY(-2px);
        }

        .categories {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin-bottom: 30px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #e63946, #b91c1c);
            border-color: transparent;
            box-shadow: 0 5px 20px rgba(230, 57, 70, 0.4);
            transform: scale(1.05);
        }

        .cat-btn:hover {
            transform: translateY(-2px);
            background: rgba(230, 57, 70, 0.3);
        }

        .section-title {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .section-title h3 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .line {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #e63946, #ff6b6b);
            border-radius: 2px;
            animation: expand 0.5s ease;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            padding: 0 20px;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(30,30,30,0.9), rgba(20,20,20,0.9));
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .add-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, #e63946, #b91c1c);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.4);
            z-index: 10;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .product-info {
            padding: 14px;
            text-align: center;
        }

        .product-info h4 {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 6px;
            color: #fff;
        }

        .product-info p {
            font-size: 11px;
            color: #999;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .price {
            color: #e63946;
            font-weight: 800;
            font-size: 15px;
            display: inline-block;
            background: rgba(230, 57, 70, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .cart-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(135deg, #e63946, #b91c1c);
            border: none;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.5);
            z-index: 99;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-btn:active {
            transform: scale(0.95);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ffc107;
            color: #000;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 13px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .whatsapp-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, #0a0a0a, transparent);
            padding: 20px 20px 25px;
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            border: none;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
        }

        .whatsapp-btn:disabled {
            opacity: 0.5;
            transform: none;
        }

        .total-price {
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 800;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(135deg, #141414, #0a0a0a);
            width: 100%;
            border-radius: 35px 35px 0 0;
            max-height: 85vh;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-header {
            padding: 22px 20px;
            border-bottom: 1px solid rgba(230, 57, 70, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(10px);
        }

        .modal-header h3 {
            font-size: 22px;
            font-weight: 800;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 14px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 18px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .cart-item-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cart-item-controls button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-item-controls button:active {
            transform: scale(0.95);
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-modal:active {
            background: rgba(255,255,255,0.1);
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toast {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #e63946, #b91c1c);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            z-index: 1001;
            animation: fadeOut 2s ease;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes expand {
            from { width: 0; }
            to { width: 60px; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .animate-pulse {
            animation: pulse 0.5s ease;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ============= جميع المنتجات =============
    const allProducts = [
        { id: 1, name: 'برغر لحم عراقي', desc: 'لحم عراقي طازج مع صوص خاص', price: 6000, cat: 'burgers', img: 'https://images.pexels.com/photos/1633578/pexels-photo-1633578.jpeg?w=400&h=400&fit=crop' },
        { id: 2, name: 'برغر دجاج', desc: 'دجاج مقرمش مع خس وطماطم', price: 5500, cat: 'burgers', img: 'https://images.pexels.com/photos/1639562/pexels-photo-1639562.jpeg?w=400&h=400&fit=crop' },
        { id: 3, name: 'وجبة برغر', desc: 'برغر + بطاطا مقرمشة + مشروب', price: 7500, cat: 'burgers', img: 'https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?w=400&h=400&fit=crop' },
        { id: 4, name: 'رول شاورما دجاج', desc: 'دجاج مشوي مع ثومية ومخللات', price: 4000, cat: 'sandwiches', img: 'https://images.pexels.com/photos/5707149/pexels-photo-5707149.jpeg?w=400&h=400&fit=crop' },
        { id: 5, name: 'رول شاورما لحم', desc: 'لحم بقري مع صلصة خاصة', price: 4500, cat: 'sandwiches', img: 'https://images.pexels.com/photos/5707149/pexels-photo-5707149.jpeg?w=400&h=400&fit=crop' },
        { id: 6, name: 'صمون كباب', desc: 'كباب عراقي مشوي على الفحم', price: 5000, cat: 'sandwiches', img: 'https://images.pexels.com/photos/4665202/pexels-photo-4665202.jpeg?w=400&h=400&fit=crop' },
        { id: 7, name: 'صمون فلافل', desc: 'فلافل طازجة مع خضار', price: 2500, cat: 'sandwiches', img: 'https://images.pexels.com/photos/6004520/pexels-photo-6004520.jpeg?w=400&h=400&fit=crop' },
        { id: 8, name: 'فلافل (10 حبات)', desc: 'فلافل مقرمشة مع طحينة', price: 2000, cat: 'sandwiches', img: 'https://images.pexels.com/photos/6004520/pexels-photo-6004520.jpeg?w=400&h=400&fit=crop' },
        { id: 9, name: 'وجبة شاورما عربي (دجاج)', desc: 'شاورما دجاج + بطاطا + بيبسي', price: 7000, cat: 'meals', img: 'https://images.pexels.com/photos/5707149/pexels-photo-5707149.jpeg?w=400&h=400&fit=crop' },
        { id: 10, name: 'وجبة شاورما عربي (لحم)', desc: 'شاورما لحم + بطاطا + بيبسي', price: 8000, cat: 'meals', img: 'https://images.pexels.com/photos/5707149/pexels-photo-5707149.jpeg?w=400&h=400&fit=crop' },
        { id: 11, name: 'وجبة ستربس', desc: 'ستربس دجاج + بطاطا + بيبسي', price: 7000, cat: 'meals', img: 'https://images.pexels.com/photos/4720475/pexels-photo-4720475.jpeg?w=400&h=400&fit=crop' },
        { id: 12, name: 'بطاطا مقلية', desc: 'بطاطا ذهبية مقرمشة', price: 2000, cat: 'sides', img: 'https://images.pexels.com/photos/1893556/pexels-photo-1893556.jpeg?w=400&h=400&fit=crop' },
        { id: 13, name: 'بطاطا ويه جبن', desc: 'بطاطا مع جبنة شيدر ذائبة', price: 3000, cat: 'sides', img: 'https://images.pexels.com/photos/1893556/pexels-photo-1893556.jpeg?w=400&h=400&fit=crop' },
        { id: 14, name: 'أجنحة دجاج (6 قطع)', desc: 'أجنحة حارة مع صوص', price: 4000, cat: 'sides', img: 'https://images.pexels.com/photos/2915280/pexels-photo-2915280.jpeg?w=400&h=400&fit=crop' },
        { id: 15, name: 'ستربس دجاج', desc: 'ستربس مقرمش مع صوص', price: 5000, cat: 'sides', img: 'https://images.pexels.com/photos/4720475/pexels-photo-4720475.jpeg?w=400&h=400&fit=crop' },
        { id: 16, name: 'بيبسي', desc: 'مشروب غازي', price: 1000, cat: 'drinks', img: 'https://images.pexels.com/photos/3729562/pexels-photo-3729562.jpeg?w=400&h=400&fit=crop' },
        { id: 17, name: 'ميرندا', desc: 'مشروب برتقال', price: 1000, cat: 'drinks', img: 'https://images.pexels.com/photos/3729562/pexels-photo-3729562.jpeg?w=400&h=400&fit=crop' },
        { id: 18, name: 'سفن أب', desc: 'مشروب ليمون', price: 1000, cat: 'drinks', img: 'https://images.pexels.com/photos/3729562/pexels-photo-3729562.jpeg?w=400&h=400&fit=crop' },
        { id: 19, name: 'عصير طبيعي', desc: 'عصير فواكه طازج', price: 2000, cat: 'drinks', img: 'https://images.pexels.com/photos/14465950/pexels-photo-14465950.jpeg?w=400&h=400&fit=crop' },
        { id: 20, name: 'ماء', desc: 'ماء معدن', price: 500, cat: 'drinks', img: 'https://images.pexels.com/photos/4041392/pexels-photo-4041392.jpeg?w=400&h=400&fit=crop' }
    ];

    const categories = [
        { id: 'burgers', name: 'البرجر', icon: '🍔' },
        { id: 'sandwiches', name: 'الساندويشات', icon: '🌯' },
        { id: 'meals', name: 'الوجبات', icon: '🍽️' },
        { id: 'sides', name: 'الإضافات', icon: '🍟' },
        { id: 'drinks', name: 'المشروبات', icon: '🥤' }
    ];

    let currentCat = 'burgers';
    let cart = [];
    let showModal = false;

    // دالة لجلب التاريخ والوقت الحالي بصيغة مرتبة
    function getCurrentDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        // أسماء الأيام
        const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const dayName = days[now.getDay()];
        
        return {
            date: `${year}/${month}/${day}`,
            time: `${hours}:${minutes}`,
            dayName: dayName,
            full: `${dayName} ${year}/${month}/${day} - ${hours}:${minutes}`
        };
    }

    function showMessage(msg) {
        let oldToast = document.querySelector('.toast');
        if(oldToast) oldToast.remove();
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function addToCart(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            cart = cart.map(item => item.id === productId ? { ...item, qty: item.qty + 1 } : item);
            showMessage(`✨ ${product.name} +1 (${existing.qty + 1})`);
        } else {
            cart.push({ ...product, qty: 1 });
            showMessage(`✨ تم إضافة ${product.name}`);
        }
        const cartBtn = document.querySelector('.cart-btn');
        if(cartBtn) cartBtn.classList.add('animate-pulse');
        setTimeout(() => { if(cartBtn) cartBtn.classList.remove('animate-pulse'); }, 500);
        render();
    }

    function removeFromCart(productId) {
        const existing = cart.find(item => item.id === productId);
        if (existing && existing.qty > 1) {
            cart = cart.map(item => item.id === productId ? { ...item, qty: item.qty - 1 } : item);
        } else {
            cart = cart.filter(item => item.id !== productId);
        }
        render();
    }

    function deleteFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        render();
    }

    function getTotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    }

    function getTotalItems() {
        return cart.reduce((sum, item) => sum + item.qty, 0);
    }

    function sendOrder() {
        if (cart.length === 0) return;
        
        const dateTime = getCurrentDateTime();
        
        // خط فاصل مرتب
        const line = "─".repeat(30);
        
        let msg = `🕌 **كرم الرمادي** 🕌\n${line}\n`;
        msg += `📅 **التاريخ:** ${dateTime.full}\n`;
        msg += `${line}\n\n`;
        msg += `📝 **تفاصيل الطلب:**\n\n`;
        
        cart.forEach((item, index) => {
            msg += `${index + 1}. 🍽️ ${item.name}\n`;
            msg += `   📦 الكمية: ${item.qty}\n`;
            msg += `   💰 السعر: ${(item.price * item.qty).toLocaleString()} د.ع\n\n`;
        });
        
        msg += `${line}\n`;
        msg += `💰 **المجموع الكلي:** ${getTotal().toLocaleString()} د.ع\n`;
        msg += `${line}\n\n`;
        msg += `📍 **العنوان:** \n`;
        msg += `📞 **رقم الجوال:** \n`;
        msg += `${line}\n`;
        msg += `✨ شكراً لثقتكم ✨`;
        
        // غير الرقم هنا إلى رقم المطعم
        window.open(`https://wa.me/9647XXXXXXXXX?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function changeCategory(cat) {
        currentCat = cat;
        render();
    }

    function openModal() {
        showModal = true;
        render();
    }
    
    function closeModal() {
        showModal = false;
        render();
    }

    function getProductsByCat() {
        return allProducts.filter(p => p.cat === currentCat);
    }

    function render() {
        const productsList = getProductsByCat();
        const activeCat = categories.find(c => c.id === currentCat);
        
        let html = `
            <div class="header">
                <div class="logo">
                    <h1>كرم الرمادي</h1>
                    <p>📍 الطريق إلينا</p>
                </div>
            </div>
            <div class="banner">
                <h2>مرحباً بكم 👋</h2>
                <p>أهلاً بك في كرم الرمادي، أطيب المأكولات بأفضل الأسعار</p>
                <button class="rating-btn" onclick="alert('⭐ شكراً لتقييمك!')">⭐ كيف كانت تجربتك؟</button>
            </div>
            <div class="categories">
                ${categories.map(cat => `<button class="cat-btn ${currentCat === cat.id ? 'active' : ''}" onclick="changeCategory('${cat.id}')">${cat.icon} ${cat.name}</button>`).join('')}
            </div>
            <div class="section-title">
                <h3>${activeCat?.name || ''}</h3>
                <div class="line"></div>
            </div>
            <div class="products">
                ${productsList.map(product => `
                    <div class="product-card">
                        <img class="product-img" src="${product.img}" alt="${product.name}" loading="lazy">
                        <button class="add-btn" onclick="addToCart(${product.id})">+</button>
                        <div class="product-info">
                            <h4>${product.name}</h4>
                            <p>${product.desc}</p>
                            <span class="price">${product.price.toLocaleString()} د.ع</span>
                        </div>
                    </div>
                `).join('')}
            </div>
            <button class="cart-btn" onclick="openModal()">🛒${getTotalItems() > 0 ? `<span class="cart-count">${getTotalItems()}</span>` : ''}</button>
            <div class="whatsapp-bar">
                <button class="whatsapp-btn" onclick="sendOrder()" ${cart.length === 0 ? 'disabled' : ''}>
                    <span>📱 اطلب عبر واتساب</span>
                    <span class="total-price">${getTotal().toLocaleString()} د.ع</span>
                </button>
            </div>
        `;

        if (showModal) {
            html += `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <h3>🛒 سلة الطلبات (${getTotalItems()})</h3>
                            <button class="close-modal" onclick="closeModal()">✕</button>
                        </div>
                        <div class="modal-body">
                            ${cart.length === 0 ? `
                                <div style="text-align: center; padding: 50px; color: #888;">
                                    <div style="font-size: 64px; margin-bottom: 15px;">🛒</div>
                                    <p>السلة فارغة</p>
                                    <p style="font-size: 13px; margin-top: 8px;">أضف منتجات لبدء الطلب</p>
                                </div>
                            ` : `
                                ${cart.map(item => `
                                    <div class="cart-item">
                                        <img class="cart-item-img" src="${item.img}" alt="${item.name}">
                                        <div class="cart-item-info">
                                            <h4>${item.name}</h4>
                                            <span style="color: #e63946; font-weight: 600;">${item.price.toLocaleString()} د.ع</span>
                                        </div>
                                        <div class="cart-item-controls">
                                            <button onclick="removeFromCart(${item.id})">−</button>
                                            <span style="min-width: 35px; text-align: center; font-weight: 700;">${item.qty}</span>
                                            <button onclick="addToCart(${item.id})">+</button>
                                            <button onclick="deleteFromCart(${item.id})" style="background: #e63946;">🗑</button>
                                        </div>
                                    </div>
                                `).join('')}
                                <div class="cart-footer">
                                    <span style="font-size: 18px; font-weight: 600;">المجموع الكلي:</span>
                                    <span style="color: #e63946; font-size: 26px; font-weight: 800;">${getTotal().toLocaleString()} د.ع</span>
                                </div>
                                <button class="whatsapp-btn" onclick="sendOrder(); closeModal();" style="margin-top: 20px; width: 100%;">تأكيد الطلب ✅</button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById('app').innerHTML = html;
    }

    window.addToCart = addToCart;
    window.removeFromCart = removeFromCart;
    window.deleteFromCart = deleteFromCart;
    window.changeCategory = changeCategory;
    window.sendOrder = sendOrder;
    window.openModal = openModal;
    window.closeModal = closeModal;

    render();
</script>

</body>
</html>
