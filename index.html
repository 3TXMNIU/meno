<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>كرم الرمادي | القائمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding-bottom: 100px;
        }

        .header {
            background: #0a0a0a;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            color: #e63946;
            font-size: 28px;
            font-weight: 900;
        }

        .logo p {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .banner {
            background: #111;
            margin: 20px;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #222;
        }

        .banner h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .banner p {
            color: #888;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .rating-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .categories {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin-bottom: 25px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .cat-btn:active {
            transform: scale(0.95);
        }

        .cat-btn.active {
            background: #e63946;
        }

        .section-title {
            padding: 0 20px;
            margin-bottom: 15px;
        }

        .section-title h3 {
            font-size: 24px;
            font-weight: 800;
        }

        .line {
            width: 50px;
            height: 3px;
            background: #e63946;
            margin-top: 5px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px;
        }

        .product-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            position: relative;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #1a1a1a;
        }

        .add-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e63946;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s ease;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        .product-info {
            padding: 12px;
            text-align: center;
        }

        .product-info h4 {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .product-info p {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .price {
            color: #e63946;
            font-weight: bold;
            font-size: 14px;
        }

        .cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e63946;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .cart-btn:active {
            transform: scale(0.95);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffc107;
            color: #000;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .whatsapp-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            padding: 15px 20px;
            border-top: 1px solid #222;
            z-index: 98;
        }

        .whatsapp-btn {
            background: #25D366;
            border: none;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .whatsapp-btn:active {
            transform: scale(0.98);
        }

        .whatsapp-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .total-price {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 30px;
        }

        .info-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-content {
            background: #111;
            width: 90%;
            max-width: 400px;
            border-radius: 25px;
            padding: 25px;
            border: 1px solid #e63946;
        }

        .info-content h3 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: #e63946;
        }

        .info-content input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }

        .info-content input:focus {
            outline: none;
            border-color: #e63946;
        }

        .info-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .info-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s ease;
        }

        .info-buttons button:active {
            transform: scale(0.97);
        }

        .confirm-btn {
            background: #25D366;
            color: white;
        }

        .cancel-btn {
            background: #333;
            color: white;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            align-items: flex-end;
        }

        .modal-content {
            background: #111;
            width: 100%;
            border-radius: 30px 30px 0 0;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 800;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 12px;
        }

        .cart-item-img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .cart-item-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cart-item-controls button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-item-controls button:active {
            transform: scale(0.9);
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #e63946;
            padding: 8px 20px;
            border-radius: 30px;
            z-index: 1001;
            animation: fadeOut 2s ease;
            font-size: 13px;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ============= المنتجات =============
    const allProducts = [
        // برجر
        { id: 1, name: 'برغر لحم عراقي', desc: 'لحم عراقي طازج مع صوص خاص', price: 6000, cat: 'burgers', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=300&fit=crop' },
        { id: 2, name: 'برغر دجاج', desc: 'دجاج مقرمش مع خس وطماطم', price: 5500, cat: 'burgers', img: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=300&h=300&fit=crop' },
        { id: 3, name: 'وجبة برغر', desc: 'برغر + بطاطا + مشروب', price: 7500, cat: 'burgers', img: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=300&h=300&fit=crop' },
        // ساندويشات
        { id: 4, name: 'رول شاورما دجاج', desc: 'شاورما دجاج بالساج', price: 4000, cat: 'sandwiches', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=300&h=300&fit=crop' },
        { id: 5, name: 'رول شاورما لحم', desc: 'شاورما لحم بالساج', price: 4500, cat: 'sandwiches', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=300&h=300&fit=crop' },
        { id: 6, name: 'صمون كباب', desc: 'كباب عراقي بالصمون', price: 5000, cat: 'sandwiches', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=300&h=300&fit=crop' },
        { id: 7, name: 'صمون فلافل', desc: 'فلافل بالصمون', price: 2500, cat: 'sandwiches', img: 'https://images.unsplash.com/photo-1593001874117-c99c800e3d6a?w=300&h=300&fit=crop' },
        { id: 8, name: 'فلافل (10 حبات)', desc: 'فلافل مع خضار', price: 2000, cat: 'sandwiches', img: 'https://images.unsplash.com/photo-1593001874117-c99c800e3d6a?w=300&h=300&fit=crop' },
        // وجبات
        { id: 9, name: 'وجبة شاورما عربي (دجاج)', desc: 'شاورما دجاج + بطاطا + مشروب', price: 7000, cat: 'meals', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=300&h=300&fit=crop' },
        { id: 10, name: 'وجبة شاورما عربي (لحم)', desc: 'شاورما لحم + بطاطا + مشروب', price: 8000, cat: 'meals', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=300&h=300&fit=crop' },
        { id: 11, name: 'وجبة ستربس', desc: 'ستربس + بطاطا + بيبسي', price: 7000, cat: 'meals', img: 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=300&h=300&fit=crop' },
        // إضافات
        { id: 12, name: 'بطاطا مقلية', desc: 'بطاطا مقرمشة', price: 2000, cat: 'sides', img: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300&h=300&fit=crop' },
        { id: 13, name: 'بطاطا ويه جبن', desc: 'بطاطا مع جبنة ذائبة', price: 3000, cat: 'sides', img: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=300&h=300&fit=crop' },
        { id: 14, name: 'أجنحة دجاج (6 قطع)', desc: 'أجنحة دجاج حارة', price: 4000, cat: 'sides', img: 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=300&h=300&fit=crop' },
        { id: 15, name: 'ستربس دجاج', desc: 'ستربس مقرمش', price: 5000, cat: 'sides', img: 'https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=300&h=300&fit=crop' },
        // مشروبات
        { id: 16, name: 'بيبسي', desc: 'مشروب غازي', price: 1000, cat: 'drinks', img: 'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=300&h=300&fit=crop' },
        { id: 17, name: 'ميرندا', desc: 'مشروب برتقال', price: 1000, cat: 'drinks', img: 'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=300&h=300&fit=crop' },
        { id: 18, name: 'سفن أب', desc: 'مشروب ليمون', price: 1000, cat: 'drinks', img: 'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=300&h=300&fit=crop' },
        { id: 19, name: 'عصير طبيعي', desc: 'عصير فواكه طازج', price: 2000, cat: 'drinks', img: 'https://images.unsplash.com/photo-1623065422902-30a2d299bbe4?w=300&h=300&fit=crop' },
        { id: 20, name: 'ماء', desc: 'ماء معدن', price: 500, cat: 'drinks', img: 'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300&h=300&fit=crop' }
    ];

    const categories = [
        { id: 'burgers', name: 'البرجر', icon: '🍔' },
        { id: 'sandwiches', name: 'الساندويشات', icon: '🌯' },
        { id: 'meals', name: 'الوجبات', icon: '🍽️' },
        { id: 'sides', name: 'الإضافات', icon: '🍟' },
        { id: 'drinks', name: 'المشروبات', icon: '🥤' }
    ];

    let currentCat = 'burgers';
    let cart = [];
    let showModal = false;
    let showInfoModal = false;

    const WHATSAPP_NUMBER = '9647815025137';

    function getCurrentDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        const dayName = days[now.getDay()];
        return `${dayName} ${year}/${month}/${day} - ${hours}:${minutes}`;
    }

    function showMessage(msg) {
        let oldToast = document.querySelector('.toast');
        if(oldToast) oldToast.remove();
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function addToCart(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            cart = cart.map(item => item.id === productId ? { ...item, qty: item.qty + 1 } : item);
            showMessage(`✅ ${product.name} +1`);
        } else {
            cart.push({ ...product, qty: 1 });
            showMessage(`✅ تم إضافة ${product.name}`);
        }
        render();
    }

    function removeFromCart(productId) {
        const existing = cart.find(item => item.id === productId);
        if (existing && existing.qty > 1) {
            cart = cart.map(item => item.id === productId ? { ...item, qty: item.qty - 1 } : item);
        } else {
            cart = cart.filter(item => item.id !== productId);
        }
        render();
    }

    function deleteFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        render();
    }

    function getTotal() {
        return cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    }

    function getTotalItems() {
        return cart.reduce((sum, item) => sum + item.qty, 0);
    }

    function sendOrderWithInfo(address, phone) {
        if (cart.length === 0) return;
        
        const dateTime = getCurrentDateTime();
        
        let msg = `🍔 كرم الرمادي 🍔\n`;
        msg += `📅 التاريخ: ${dateTime}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `📝 تفاصيل الطلب:\n\n`;
        
        cart.forEach((item, i) => {
            msg += `${i+1}. ${item.name}\n`;
            msg += `   الكمية: ${item.qty}\n`;
            msg += `   السعر: ${(item.price * item.qty).toLocaleString()} د.ع\n\n`;
        });
        
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `💰 المجموع: ${getTotal().toLocaleString()} د.ع\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        msg += `📍 العنوان: ${address}\n`;
        msg += `📞 الجوال: ${phone}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `✨ شكراً لثقتكم ✨`;
        
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function requestInfo() {
        if (cart.length === 0) return;
        showInfoModal = true;
        render();
    }

    function submitInfo() {
        const address = document.getElementById('addressInput')?.value;
        const phone = document.getElementById('phoneInput')?.value;
        
        if (!address || !phone) {
            showMessage('⚠️ الرجاء إدخال العنوان ورقم الجوال');
            return;
        }
        
        sendOrderWithInfo(address, phone);
        showInfoModal = false;
        render();
    }

    function cancelInfo() {
        showInfoModal = false;
        render();
    }

    function changeCategory(cat) {
        currentCat = cat;
        render();
    }

    function openModal() {
        showModal = true;
        render();
    }
    
    function closeModal() {
        showModal = false;
        render();
    }

    function getProductsByCat() {
        return allProducts.filter(p => p.cat === currentCat);
    }

    function render() {
        const productsList = getProductsByCat();
        const activeCat = categories.find(c => c.id === currentCat);
        
        let html = `
            <div class="header">
                <div class="logo">
                    <h1>كرم الرمادي</h1>
                    <p>📍 الطريق إلينا</p>
                </div>
            </div>
            <div class="banner">
                <h2>مرحباً بكم 👋</h2>
                <p>أهلاً بك في كرم الرمادي، أطيب المأكولات بأفضل الأسعار</p>
                <button class="rating-btn" onclick="alert('⭐ شكراً لتقييمك!')">⭐ كيف كانت تجربتك؟</button>
            </div>
            <div class="categories">
                ${categories.map(cat => `<button class="cat-btn ${currentCat === cat.id ? 'active' : ''}" onclick="changeCategory('${cat.id}')">${cat.icon} ${cat.name}</button>`).join('')}
            </div>
            <div class="section-title">
                <h3>${activeCat?.name || ''}</h3>
                <div class="line"></div>
            </div>
            <div class="products">
                ${productsList.map(product => `
                    <div class="product-card">
                        <img class="product-img" src="${product.img}" alt="${product.name}" loading="lazy">
                        <button class="add-btn" onclick="addToCart(${product.id})">+</button>
                        <div class="product-info">
                            <h4>${product.name}</h4>
                            <p>${product.desc}</p>
                            <span class="price">${product.price.toLocaleString()} د.ع</span>
                        </div>
                    </div>
                `).join('')}
            </div>
            <button class="cart-btn" onclick="openModal()">🛒${getTotalItems() > 0 ? `<span class="cart-count">${getTotalItems()}</span>` : ''}</button>
            <div class="whatsapp-bar">
                <button class="whatsapp-btn" onclick="requestInfo()" ${cart.length === 0 ? 'disabled' : ''}>
                    <span>📱 اطلب عبر واتساب</span>
                    <span class="total-price">${getTotal().toLocaleString()} د.ع</span>
                </button>
            </div>
        `;

        // مودال السلة
        if (showModal) {
            html += `
                <div class="modal" onclick="closeModal()">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <h3>🛒 سلة الطلبات (${getTotalItems()})</h3>
                            <button class="close-modal" onclick="closeModal()">✕</button>
                        </div>
                        <div class="modal-body">
                            ${cart.length === 0 ? `
                                <div style="text-align: center; padding: 40px; color: #666;">
                                    <div style="font-size: 48px;">🛒</div>
                                    <p>السلة فارغة</p>
                                </div>
                            ` : `
                                ${cart.map(item => `
                                    <div class="cart-item">
                                        <img class="cart-item-img" src="${item.img}" alt="${item.name}" loading="lazy">
                                        <div class="cart-item-info">
                                            <h4>${item.name}</h4>
                                            <span style="color: #e63946;">${item.price.toLocaleString()} د.ع</span>
                                        </div>
                                        <div class="cart-item-controls">
                                            <button onclick="removeFromCart(${item.id})">-</button>
                                            <span style="min-width: 30px; text-align: center;">${item.qty}</span>
                                            <button onclick="addToCart(${item.id})">+</button>
                                            <button onclick="deleteFromCart(${item.id})" style="background: #e63946;">🗑</button>
                                        </div>
                                    </div>
                                `).join('')}
                                <div class="cart-footer">
                                    <span>المجموع الكلي:</span>
                                    <span style="color: #e63946; font-size: 22px; font-weight: bold;">${getTotal().toLocaleString()} د.ع</span>
                                </div>
                                <button class="whatsapp-btn" onclick="requestInfo(); closeModal();" style="margin-top: 15px; width: 100%;">تأكيد الطلب ✅</button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // نافذة إدخال العنوان والرقم
        if (showInfoModal) {
            html += `
                <div class="info-modal" onclick="cancelInfo()">
                    <div class="info-content" onclick="event.stopPropagation()">
                        <h3>📝 معلومات الطلب</h3>
                        <input type="text" id="addressInput" placeholder="📍 العنوان" autocomplete="off">
                        <input type="tel" id="phoneInput" placeholder="📞 رقم الجوال" autocomplete="off">
                        <div class="info-buttons">
                            <button class="confirm-btn" onclick="submitInfo()">تأكيد</button>
                            <button class="cancel-btn" onclick="cancelInfo()">إلغاء</button>
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById('app').innerHTML = html;
    }

    window.addToCart = addToCart;
    window.removeFromCart = removeFromCart;
    window.deleteFromCart = deleteFromCart;
    window.changeCategory = changeCategory;
    window.requestInfo = requestInfo;
    window.submitInfo = submitInfo;
    window.cancelInfo = cancelInfo;
    window.openModal = openModal;
    window.closeModal = closeModal;

    render();
</script>

</body>
</html>
