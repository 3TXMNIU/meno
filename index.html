<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرم الرمادي - مطعم برغر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 50%, #1a1a1a 100%);
            color: white;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-slideUp {
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #ff6b35, #ef4444);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: #999;
        }

        .header-icons {
            display: flex;
            gap: 1rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Hero Banner */
        .hero {
            position: relative;
            height: 256px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .hero-btn {
            padding: 0.75rem;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        .hero-btn.rating {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .hero-btn.instagram {
            background: #e1306c;
        }

        .hero-btn.phone {
            background: #25d366;
        }

        /* Categories */
        .categories {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .category-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: #2a2a2a;
            color: white;
            font-family: 'Tajawal', Arial, sans-serif;
        }

        .category-btn:hover {
            transform: scale(1.05);
            background: #3a3a3a;
        }

        .category-btn.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        .category-btn .icon {
            font-size: 2.5rem;
        }

        .category-btn .name {
            font-weight: bold;
            font-size: 1.125rem;
        }

        /* Products Section */
        .products-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .products-header h3 {
            font-size: 2rem;
            font-weight: 900;
        }

        .title-underline {
            height: 4px;
            width: 80px;
            background: #ef4444;
            margin-top: 0.5rem;
            border-radius: 2px;
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .view-btn {
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: #2a2a2a;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: #3a3a3a;
        }

        .view-btn.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .products-grid.list-view {
            grid-template-columns: 1fr;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(42, 42, 42, 0.8), rgba(26, 26, 26, 0.8));
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
        }

        .product-image-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.75rem;
            margin: 0.75rem;
            overflow: hidden;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .add-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #ef4444;
            border: none;
            padding: 0.625rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
            color: white;
            font-size: 1rem;
        }

        .add-btn:hover {
            background: #dc2626;
            transform: rotate(90deg);
        }

        .product-info {
            padding: 0 0.75rem 1rem;
            text-align: center;
        }

        .product-name {
            font-size: 1.125rem;
            font-weight: 900;
            margin-bottom: 0.25rem;
        }

        .product-description {
            color: #999;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .product-price {
            font-size: 1.125rem;
            font-weight: 900;
            color: #ef4444;
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid #333;
        }

        .bottom-bar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }

        .cart-btn {
            position: relative;
            background: #ef4444;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            color: white;
            font-size: 1.5rem;
        }

        .cart-btn:hover {
            background: #dc2626;
        }

        .cart-badge {
            position: absolute;
            top: -0.5rem;
            right: -0.5rem;
            background: #fbbf24;
            color: black;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: bold;
            animation: pulse 2s ease-in-out infinite;
        }

        .whatsapp-btn {
            flex: 1;
            background: linear-gradient(to right, #25d366, #22c55e);
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.125rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.4);
            font-family: 'Tajawal', Arial, sans-serif;
        }

        .whatsapp-btn:hover {
            background: linear-gradient(to right, #22c55e, #16a34a);
        }

        .whatsapp-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .price-badge {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            align-items: flex-end;
            justify-content: center;
        }

        .cart-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .cart-content {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            width: 100%;
            max-width: 768px;
            max-height: 80vh;
            border-radius: 1.5rem 1.5rem 0 0;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid #333;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
            font-weight: 900;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background 0.3s;
            font-size: 1.5rem;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .cart-items {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(80vh - 200px);
        }

        .empty-cart {
            text-align: center;
            padding: 3rem 0;
            color: #999;
        }

        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .cart-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 0.75rem;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            color: #ef4444;
            font-weight: bold;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .quantity-btn {
            background: #2a2a2a;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .quantity-btn:hover {
            background: #3a3a3a;
        }

        .quantity-btn.plus {
            background: #ef4444;
        }

        .quantity-btn.plus:hover {
            background: #dc2626;
        }

        .quantity-btn.delete {
            margin-right: 0.5rem;
        }

        .quantity-btn.delete:hover {
            background: #ef4444;
        }

        .quantity {
            font-weight: bold;
            font-size: 1.25rem;
            width: 2rem;
            text-align: center;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid #333;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total-label {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .cart-total-price {
            font-size: 2rem;
            font-weight: 900;
            color: #ef4444;
        }

        /* Customer Info Modal */
        .info-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .info-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        .info-content {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            width: 90%;
            max-width: 500px;
            border-radius: 1.5rem;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        .info-header {
            padding: 1.5rem;
            border-bottom: 1px solid #333;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .info-header h3 {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ef4444;
        }

        .info-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #fff;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-family: 'Tajawal', Arial, sans-serif;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ef4444;
        }

        .info-footer {
            padding: 1.5rem;
            border-top: 1px solid #333;
            display: flex;
            gap: 1rem;
        }

        .cancel-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            background: #2a2a2a;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Tajawal', Arial, sans-serif;
        }

        .send-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            background: linear-gradient(to right, #25d366, #22c55e);
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Tajawal', Arial, sans-serif;
        }

        .send-btn:hover {
            background: linear-gradient(to right, #22c55e, #16a34a);
        }

        .cancel-btn:hover {
            background: #3a3a3a;
        }

        @media (max-width: 640px) {
            .hero h2 {
                font-size: 2rem;
            }
            
            .category-btn {
                padding: 0.75rem 1.5rem;
            }
            
            .category-btn .icon {
                font-size: 2rem;
            }
            
            .category-btn .name {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container animate-fadeIn">
            <div class="logo">
                <div class="logo-icon">👑</div>
                <div class="logo-text">
                    <h1>كرم الرمادي</h1>
                    <p>📍 الطريق إلينا</p>
                </div>
            </div>
            <div class="header-icons">
                <button class="icon-btn">🔍</button>
                <button class="icon-btn">👤</button>
            </div>
        </div>
    </header>

    <!-- Hero Banner -->
    <div class="hero animate-slideUp">
        <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=1200&h=400&fit=crop" alt="Banner">
        <div class="hero-overlay">
            <h2>مرحباً بكم</h2>
            <div class="hero-actions">
                <button class="hero-btn rating">⭐ كيف كانت تجربتك؟</button>
                <button class="hero-btn instagram">📷</button>
                <button class="hero-btn phone">📞</button>
            </div>
        </div>
    </div>

    <!-- Categories -->
    <div class="categories">
        <button class="category-btn active" data-category="burgers">
            <span class="icon">🍔</span>
            <span class="name">البرگر</span>
        </button>
        <button class="category-btn" data-category="sandwiches">
            <span class="icon">🌯</span>
            <span class="name">الساندويشات</span>
        </button>
        <button class="category-btn" data-category="sides">
            <span class="icon">🍟</span>
            <span class="name">الإضافات</span>
        </button>
    </div>

    <!-- Products Section -->
    <div class="products-section">
        <div class="products-header animate-slideUp">
            <div>
                <h3 id="category-title">البرگر</h3>
                <div class="title-underline"></div>
            </div>
            <div class="view-toggle">
                <button class="view-btn" data-view="list">☰</button>
                <button class="view-btn active" data-view="grid">⊞</button>
            </div>
        </div>
        <div class="products-grid" id="products-container"></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <div class="bottom-bar-container">
            <button class="cart-btn" id="cart-toggle">
                🛒
                <span class="cart-badge" id="cart-badge" style="display: none;">0</span>
            </button>
            <button class="whatsapp-btn" id="whatsapp-order" disabled>
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                اطلب عبر واتساب
                <span class="price-badge" id="total-price">0 د.ع</span>
            </button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <div class="cart-header">
                <h3>سلة الطلبات (<span id="cart-count">0</span> منتج)</h3>
                <button class="close-btn" id="close-cart">×</button>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="empty-cart">
                    <div class="empty-cart-icon">🛒</div>
                    <p style="font-size: 1.125rem;">السلة فارغة! أضف منتجات لبدء الطلب</p>
                </div>
            </div>
            <div class="cart-footer" id="cart-footer" style="display: none;">
                <div class="cart-total">
                    <span class="cart-total-label">المجموع الكلي:</span>
                    <span class="cart-total-price" id="cart-total">0 د.ع</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Info Modal -->
    <div class="info-modal" id="info-modal">
        <div class="info-content">
            <div class="info-header">
                <h3>📋 معلومات الطلب</h3>
                <p style="color: #999; margin-top: 0.5rem;">يرجى تعبئة البيانات لإتمام الطلب</p>
            </div>
            <div class="info-body">
                <div class="form-group">
                    <label>📍 أقرب نقطة دالة</label>
                    <input type="text" id="customer-landmark" placeholder="أدخل أقرب نقطة دالة">
                </div>
                <div class="form-group">
                    <label>📞 رقم الهاتف</label>
                    <input type="tel" id="customer-phone" placeholder="مثال: 0770 000 0000">
                </div>
            </div>
            <div class="info-footer">
                <button class="cancel-btn" id="cancel-order">إلغاء</button>
                <button class="send-btn" id="send-order">إرسال الطلب 📤</button>
            </div>
        </div>
    </div>

    <script>
        // Create audio element for click sound
        let audioContext = null;
        
        function playClickSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.1;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.1);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch(e) {
                console.log('Audio not supported');
            }
        }

        // Data with IQD prices
        const products = {
            burgers: [
                {
                    id: 1,
                    name: 'تشيزي برگر',
                    description: 'لحم مع جبن سايح ذايب + صوص خاص، كلاسيك أمريكي.',
                    price: 7500,
                    image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500&h=500&fit=crop'
                },
                {
                    id: 2,
                    name: 'كلاسيك برگر',
                    description: 'لحم، خس، طماطم، بصل، صوص خاص، بدون تعقيد.',
                    price: 6500,
                    image: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=500&h=500&fit=crop'
                },
                {
                    id: 3,
                    name: 'دبل برگر',
                    description: 'طبقتين لحم، جبن مضاعف، صوص حار وكلاسيك.',
                    price: 9500,
                    image: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=500&h=500&fit=crop'
                },
                {
                    id: 4,
                    name: 'برگر مشوي',
                    description: 'لحم مشوي على الفحم، صوص باربكيو، بصل محمص.',
                    price: 8500,
                    image: 'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=500&h=500&fit=crop'
                }
            ],
            sandwiches: [
                {
                    id: 5,
                    name: 'شاورما لحم',
                    description: 'لحم بقري مع خضار وثومية ومخللات.',
                    price: 5500,
                    image: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=500&h=500&fit=crop'
                },
                {
                    id: 6,
                    name: 'فاهيتا دجاج',
                    description: 'دجاج مشوي مع فلفل ملون وبصل وصوص.',
                    price: 6000,
                    image: 'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=500&h=500&fit=crop'
                }
            ],
            sides: [
                {
                    id: 7,
                    name: 'بطاطا مقلية',
                    description: 'بطاطا مقرمشة مع ملح وتوابل.',
                    price: 2500,
                    image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500&h=500&fit=crop'
                },
                {
                    id: 8,
                    name: 'حلقات البصل',
                    description: 'حلقات بصل مقرمشة مع صوص خاص.',
                    price: 3000,
                    image: 'https://images.unsplash.com/photo-1639024471283-03518883512d?w=500&h=500&fit=crop'
                }
            ]
        };

        const categoryNames = {
            burgers: 'البرگر',
            sandwiches: 'الساندويشات',
            sides: 'الإضافات'
        };

        let currentCategory = 'burgers';
        let cart = [];

        // Display Products
        function displayProducts(category) {
            const container = document.getElementById('products-container');
            const categoryProducts = products[category];
            
            container.innerHTML = '';
            
            categoryProducts.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card animate-slideUp';
                card.style.animationDelay = `${0.4 + index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="product-image-container">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <button class="add-btn" onclick="addToCart(${product.id}, '${category}')">+</button>
                    </div>
                    <div class="product-info">
                        <h4 class="product-name">${product.name}</h4>
                        <p class="product-description">${product.description}</p>
                        <span class="product-price">${product.price.toLocaleString()} د.ع</span>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Add to Cart
        function addToCart(productId, category) {
            playClickSound();
            const product = products[category].find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
        }

        // Remove from Cart
        function removeFromCart(productId) {
            playClickSound();
            const item = cart.find(item => item.id === productId);
            if (item.quantity > 1) {
                item.quantity--;
            } else {
                cart = cart.filter(item => item.id !== productId);
            }
            updateCart();
        }

        // Delete from Cart
        function deleteFromCart(productId) {
            playClickSound();
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Update Cart UI
        function updateCart() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            const badge = document.getElementById('cart-badge');
            if (totalItems > 0) {
                badge.textContent = totalItems;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
            
            document.getElementById('total-price').textContent = totalPrice.toLocaleString() + ' د.ع';
            document.getElementById('cart-total').textContent = totalPrice.toLocaleString() + ' د.ع';
            document.getElementById('whatsapp-order').disabled = cart.length === 0;
            document.getElementById('cart-count').textContent = totalItems;
            
            displayCartItems();
        }

        // Display Cart Items
        function displayCartItems() {
            const container = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p style="font-size: 1.125rem;">السلة فارغة! أضف منتجات لبدء الطلب</p>
                    </div>
                `;
                footer.style.display = 'none';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-info">
                            <h4 class="cart-item-name">${item.name}</h4>
                            <p class="cart-item-price">${item.price.toLocaleString()} د.ع</p>
                        </div>
                        <div class="cart-item-controls">
                            <button class="quantity-btn" onclick="removeFromCart(${item.id})">−</button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="quantity-btn plus" onclick="addToCart(${item.id}, '${currentCategory}')">+</button>
                            <button class="quantity-btn delete" onclick="deleteFromCart(${item.id})">×</button>
                        </div>
                    </div>
                `).join('');
                footer.style.display = 'block';
            }
        }

        // Send order to WhatsApp with customer info - مختصرة
        function sendOrderToWhatsApp() {
            const phone = document.getElementById('customer-phone').value.trim();
            const landmark = document.getElementById('customer-landmark').value.trim();
            
            if (!phone || !landmark) {
                alert('❌ الرجاء تعبئة جميع الحقول قبل إرسال الطلب');
                return false;
            }
            
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // رسالة مختصرة
            let orderDetails = `🍔 طلب جديد 🍔\n\n`;
            orderDetails += `📍 العنوان: ${landmark}\n`;
            orderDetails += `📞 رقم الهاتف: ${phone}\n`;
            orderDetails += `━━━━━━━━━━━━━━━━━━━━\n`;
            orderDetails += `🛒 الطلب:\n`;
            
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                orderDetails += `${index + 1}. ${item.name} × ${item.quantity} = ${itemTotal.toLocaleString()} د.ع\n`;
            });
            
            orderDetails += `━━━━━━━━━━━━━━━━━━━━\n`;
            orderDetails += `💰 المجموع: ${totalPrice.toLocaleString()} د.ع\n`;
            
            const whatsappNumber = '9647815025137';
            const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(orderDetails)}`;
            
            window.open(whatsappUrl, '_blank');
            
            // Reset cart and close modals
            cart = [];
            updateCart();
            document.getElementById('info-modal').classList.remove('show');
            document.getElementById('cart-modal').classList.remove('show');
            
            return true;
        }

        // Category Selection
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                playClickSound();
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const category = btn.getAttribute('data-category');
                currentCategory = category;
                document.getElementById('category-title').textContent = categoryNames[category];
                displayProducts(category);
            });
        });

        // View Toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                playClickSound();
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const view = btn.getAttribute('data-view');
                const container = document.getElementById('products-container');
                
                if (view === 'list') {
                    container.classList.add('list-view');
                } else {
                    container.classList.remove('list-view');
                }
            });
        });

        // Cart Modal
        document.getElementById('cart-toggle').addEventListener('click', () => {
            playClickSound();
            document.getElementById('cart-modal').classList.add('show');
        });

        document.getElementById('close-cart').addEventListener('click', () => {
            playClickSound();
            document.getElementById('cart-modal').classList.remove('show');
        });

        document.getElementById('cart-modal').addEventListener('click', (e) => {
            if (e.target.id === 'cart-modal') {
                playClickSound();
                document.getElementById('cart-modal').classList.remove('show');
            }
        });

        // Hero buttons click sounds
        document.querySelectorAll('.hero-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                playClickSound();
            });
        });

        // WhatsApp Order - Show customer info modal
        document.getElementById('whatsapp-order').addEventListener('click', () => {
            playClickSound();
            if (cart.length > 0) {
                document.getElementById('info-modal').classList.add('show');
            }
        });

        // Cancel order button
        document.getElementById('cancel-order').addEventListener('click', () => {
            playClickSound();
            document.getElementById('info-modal').classList.remove('show');
        });

        // Send order button
        document.getElementById('send-order').addEventListener('click', () => {
            playClickSound();
            sendOrderToWhatsApp();
        });

        // Close info modal when clicking outside
        document.getElementById('info-modal').addEventListener('click', (e) => {
            if (e.target.id === 'info-modal') {
                playClickSound();
                document.getElementById('info-modal').classList.remove('show');
            }
        });

        // Initialize
        displayProducts(currentCategory);
        
        // Initialize audio context on first user interaction
        document.body.addEventListener('click', function initAudio() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
  </html>
